<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲玩家實力記錄器</title>
    <style>
        :root { 
            --primary: #3b82f6; --danger: #ef4444; --bg: #121212; 
            --card-bg: #1e1e1e; --text: #e0e0e0; --input-bg: #2d2d2d;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; }

        .player-card { background: var(--card-bg); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #333; transition: transform 0.2s; }
        .drag-handle { cursor: grab; padding: 5px; color: #666; font-size: 1.2rem; margin-right: 10px; user-select: none; }
        .player-info { flex: 1; pointer-events: none; }
        .player-name { font-weight: bold; }
        .menu-dots { cursor: pointer; color: #888; font-size: 1.2rem; padding: 0 10px; position: relative; }
        
        .fab { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 50; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #444; border-radius: 6px; background: var(--input-bg); color: white; box-sizing: border-box; }
        .actions { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>玩家實力排行榜</h1>
    <div id="playerList"></div>
</div>

<button class="fab" onclick="openModal()">+ 新增玩家</button>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2 id="modalTitle">新增玩家資料</h2>
        <input type="hidden" id="editId">
        <input type="text" id="name" placeholder="遊戲 ID">
        <input type="text" id="dcName" placeholder="DC 名稱">
        <input type="number" id="score" placeholder="實力分數">
        <textarea id="note" placeholder="備註..."></textarea>
        <div class="actions">
            <button onclick="closeModal()">取消</button>
            <button onclick="savePlayer()" style="background:var(--primary); border:none; padding:8px 15px; color:white; border-radius:6px;">確認</button>
        </div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('players')) || [];
    let draggedItem = null;

    function render() {
        const list = document.getElementById('playerList');
        list.innerHTML = '';
        players.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.draggable = true;
            card.dataset.index = index;
            card.innerHTML = `
                <div class="drag-handle" onmousedown="enableDrag(this)">⠿</div>
                <div class="player-info">
                    <div class="player-name">${p.name} (${p.score}分)</div>
                    <div style="font-size:0.8rem; color:#aaa;">DC: ${p.dcName}</div>
                </div>
                <div class="menu-dots" onclick="showOptionsMenu(event, ${p.id})">⋮</div>
            `;
            
            card.addEventListener('dragstart', () => draggedItem = card);
            card.addEventListener('dragover', e => e.preventDefault());
            card.addEventListener('drop', e => handleDrop(e, index));
            list.appendChild(card);
        });
        localStorage.setItem('players', JSON.stringify(players));
    }

    function enableDrag(el) { el.closest('.player-card').draggable = true; }

    function handleDrop(e, targetIndex) {
        e.preventDefault();
        const draggedIndex = parseInt(draggedItem.dataset.index);
        const movedPlayer = players.splice(draggedIndex, 1)[0];
        players.splice(targetIndex, 0, movedPlayer);
        render();
    }

    function showOptionsMenu(e, id) {
        const action = confirm("按「確定」刪除，按「取消」編輯");
        if (action) {
            players = players.filter(p => p.id !== id);
            render();
        } else {
            const p = players.find(x => x.id === id);
            openModal(p);
        }
    }

    function openModal(p = null) {
        document.getElementById('modalTitle').innerText = p ? '編輯玩家' : '新增玩家';
        document.getElementById('editId').value = p ? p.id : '';
        document.getElementById('name').value = p ? p.name : '';
        document.getElementById('dcName').value = p ? p.dcName : '';
        document.getElementById('score').value = p ? p.score : '';
        document.getElementById('note').value = p ? p.note : '';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function savePlayer() {
        const id = document.getElementById('editId').value;
        const data = {
            id: id ? parseInt(id) : Date.now(),
            name: document.getElementById('name').value,
            dcName: document.getElementById('dcName').value,
            score: parseInt(document.getElementById('score').value),
            note: document.getElementById('note').value
        };
        if (id) {
            const idx = players.findIndex(p => p.id === parseInt(id));
            players[idx] = data;
        } else {
            players.push(data);
        }
        closeModal();
        render();
    }

    render();
</script>

</body>
</html>
