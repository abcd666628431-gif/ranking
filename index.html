<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄聯盟-統計系統</title>
    <!-- 加入網頁圖示 (Favicon) -->
    <link rel="icon" href="https://i.pinimg.com/736x/d1/b1/1d/d1b11d5e4dbae547ac0d651476cec488.jpg" type="image/jpeg">
    <link rel="shortcut icon" href="https://i.pinimg.com/736x/d1/b1/1d/d1b11d5e4dbae547ac0d651476cec488.jpg" type="image/jpeg">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, updateDoc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const userConfig = {
            apiKey: "AIzaSyDcH7BFp9xghWLdgvsLseo3XyJG_opf9A8",
            authDomain: "icarus2-50e01.firebaseapp.com",
            projectId: "icarus2-50e01",
            storageBucket: "icarus2-50e01.firebasestorage.app",
            messagingSenderId: "67456823",
            appId: "1:67456823:web:9b90f0c93d3cd1c7a394b2"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : (userConfig.appId || 'default-app-id');

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const POS_COLORS = { MID: '#ff4d4f', TOP: '#9747FF', AD: '#F59E0B', JG: '#10B981', SUP: '#EC4899' };
        let activeTab = 'trash'; // 預設開啟畜生名單
        let searchQuery = '';
        let activeView = 'tier'; 
        let dataStore = { players: [], trash: [] };
        let selectedPos = []; 
        let sortableInstances = [];
        let sortableListInstance = null;
        let isEditMode = false;
        let isPlayersTabUnlocked = false; 

        const getCol = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);

        function initSortable() {
            sortableInstances.forEach(inst => inst.destroy());
            sortableInstances = [];
            const currentTab = activeTab;
            const tiers = ['T0', 'T1', 'T2', 'T3', 'T4', 'T5'];
            tiers.forEach(tierId => {
                const el = document.getElementById(`tier-${tierId}`);
                if (!el) return;
                const inst = new Sortable(el, {
                    group: 'sharedTiers', 
                    handle: '.drag-handle',
                    animation: 150,
                    disabled: !isEditMode,
                    forceFallback: true, 
                    fallbackClass: "sortable-fallback",
                    ghostClass: "sortable-ghost",
                    onEnd: async (evt) => {
                        const id = evt.item.dataset.id;
                        const toTier = evt.to.dataset.tier;
                        const newOrder = evt.newIndex;
                        let newScore = parseInt(evt.item.dataset.score) || 0;
                        if (toTier === 'T0' && newScore < 105) newScore = 110;
                        else if (toTier === 'T1' && (newScore < 90 || newScore >= 105)) newScore = 95;
                        else if (toTier === 'T2' && (newScore < 75 || newScore >= 90)) newScore = 80;
                        else if (toTier === 'T3' && (newScore < 60 || newScore >= 75)) newScore = 65;
                        else if (toTier === 'T4' && (newScore < 45 || newScore >= 60)) newScore = 50;
                        else if (toTier === 'T5' && newScore >= 45) newScore = 35;
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', currentTab, id);
                        await updateDoc(docRef, { order: newOrder, score: newScore });
                    }
                });
                sortableInstances.push(inst);
            });
        }

        function initSortableList() {
            const listEl = document.getElementById('playerList');
            if (sortableListInstance) sortableListInstance.destroy();
            const currentTab = activeTab;
            sortableListInstance = new Sortable(listEl, {
                handle: '.drag-handle',
                animation: 150,
                disabled: !isEditMode,
                forceFallback: true,
                fallbackClass: "sortable-fallback",
                ghostClass: "sortable-ghost",
                onEnd: async (evt) => {
                    const id = evt.item.dataset.id;
                    const newOrder = evt.newIndex;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', currentTab, id);
                    await updateDoc(docRef, { order: newOrder });
                }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            ['players', 'trash'].forEach(col => {
                onSnapshot(getCol(col), (snapshot) => {
                    dataStore[col] = [];
                    snapshot.forEach(d => dataStore[col].push({ id: d.id, ...d.data() }));
                    dataStore[col].sort((a, b) => (a.order || 0) - (b.order || 0));
                    render();
                }, (err) => console.error("Firestore Error:", err));
            });
        });

        window.toggleEditMode = (checked) => {
            isEditMode = checked;
            document.body.classList.toggle('edit-mode', checked);
            sortableInstances.forEach(inst => inst.option("disabled", !isEditMode));
            if (sortableListInstance) sortableListInstance.option("disabled", !isEditMode);
        };

        window.updateSearch = (val) => { searchQuery = val.toLowerCase(); render(); };
        
        window.switchTab = (tab) => {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            render();
        };

        window.showPasswordModal = () => document.getElementById('passwordModal').style.display = 'flex';
        window.closePasswordModal = () => document.getElementById('passwordModal').style.display = 'none';

        window.verifyPassword = () => {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === 'GodCloud') {
                isPlayersTabUnlocked = true;
                closePasswordModal();
                render();
            } else {
                // 因環境嚴禁使用 alert()，改為直接在輸入框顯示錯誤提示，不影響原本 UI
                const input = document.getElementById('passwordInput');
                input.value = '';
                input.placeholder = '密碼錯誤！';
                setTimeout(() => input.placeholder = '輸入密碼...', 2000);
            }
        };

        window.switchView = (view) => {
            activeView = view;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
            render();
        };

        window.selectPos = (pos) => {
            if (selectedPos.includes(pos)) selectedPos = selectedPos.filter(p => p !== pos);
            else selectedPos.push(pos);
            document.querySelectorAll('.pos-option').forEach(btn => btn.classList.toggle('active', selectedPos.includes(btn.dataset.pos)));
        };

        window.openModal = (id = '') => {
            const list = dataStore[activeTab];
            const p = id ? list.find(x => x.id === id) : null;
            document.getElementById('editId').value = id;
            document.getElementById('name').value = p ? p.name : '';
            document.getElementById('nickName').value = p ? (p.nickName || '') : '';
            document.getElementById('dcName').value = p ? (p.dcName || '') : '';
            document.getElementById('dcName2').value = p ? (p.dcName2 || '') : '';
            document.getElementById('note').value = p ? p.note : '';
            document.getElementById('imgUrl').value = p ? (p.imgUrl || '') : '';
            
            let scoreVal = p ? (p.score >= 105 ? 'S+' : p.score >= 90 ? 'S' : p.score >= 75 ? 'A' : p.score >= 60 ? 'B' : p.score >= 45 ? 'C' : 'D') : 'S+';
            document.getElementById('score').value = scoreVal;
            
            selectedPos = p ? (Array.isArray(p.pos) ? p.pos : [p.pos || 'TOP']) : [];
            document.querySelectorAll('.pos-option').forEach(btn => btn.classList.toggle('active', selectedPos.includes(btn.dataset.pos)));
            
            document.getElementById('delBtn').style.display = id ? 'block' : 'none';
            document.getElementById('modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        window.savePlayer = async () => {
            const id = document.getElementById('editId').value;
            const scoreMap = { 'S+': 110, 'S': 95, 'A': 80, 'B': 65, 'C': 50, 'D': 35 };
            const data = {
                name: document.getElementById('name').value,
                nickName: document.getElementById('nickName').value || '',
                dcName: document.getElementById('dcName').value,
                dcName2: document.getElementById('dcName2').value || '',
                score: scoreMap[document.getElementById('score').value],
                pos: selectedPos,
                note: document.getElementById('note').value,
                imgUrl: document.getElementById('imgUrl').value || ''
            };
            closeModal();
            if (id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', activeTab, id), data);
            else await addDoc(getCol(activeTab), { ...data, order: dataStore[activeTab].length });
        };

        // 補上遺漏的刪除玩家功能，使按鈕能正常作用
        window.deletePlayer = async () => {
            const id = document.getElementById('editId').value;
            if (id) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', activeTab, id));
                closeModal();
            }
        };

        function render() {
            const tierList = document.getElementById('tierList');
            const listNormal = document.getElementById('listNormal');
            const lockOverlay = document.getElementById('lockOverlay');
            const listContainer = document.querySelector('.list-container');

            // 鎖定顯示邏輯：加上動態高度限制，避免列表過長/過短導致鎖頭 UI 歪掉跑位
            if (activeTab === 'players' && !isPlayersTabUnlocked) {
                lockOverlay.style.display = 'flex';
                listContainer.style.minHeight = '500px';
                listContainer.style.maxHeight = '80vh';
                listContainer.style.overflow = 'hidden';
            } else {
                lockOverlay.style.display = 'none';
                listContainer.style.minHeight = '0px';
                listContainer.style.maxHeight = 'none';
                listContainer.style.overflow = 'visible';
            }

            const filtered = dataStore[activeTab].filter(p => 
                (p.name || '').toLowerCase().includes(searchQuery) || (p.nickName || '').toLowerCase().includes(searchQuery) || 
                (p.dcName || '').toLowerCase().includes(searchQuery) || (p.dcName2 || '').toLowerCase().includes(searchQuery)
            );

            if (activeView === 'tier') {
                tierList.style.display = 'flex';
                listNormal.style.display = 'none';
                ['T0', 'T1', 'T2', 'T3', 'T4', 'T5'].forEach(t => document.getElementById(`tier-${t}`).innerHTML = '');

                filtered.forEach((p) => {
                    const row = document.createElement('div');
                    row.className = 'list-row';
                    row.dataset.id = p.id;
                    row.dataset.score = p.score || 0;
                    const posHtml = (Array.isArray(p.pos) ? p.pos : [p.pos || 'TOP']).map(pos => `<span class="pos-badge" style="background:${POS_COLORS[pos] || '#999'}">${pos}</span>`).join('');
                    
                    row.innerHTML = `
                        <div class="player-card">
                            <div class="card-content"><div class="card-header"><div class="pos-badge-container">${posHtml}</div><span class="player-name">${p.nickName || '-'}</span></div></div>
                            <div class="card-actions"><span class="drag-handle">⠿</span><span class="menu-dots" onclick="openModal('${p.id}')">⋮</span></div>
                            <div class="card-tooltip">
                                <div class="tooltip-title">${p.name || '-'}</div>
                                <div class="tooltip-grid">
                                    <div class="tooltip-label">暱稱</div><div class="tooltip-value">${p.nickName || '-'}</div>
                                    <div class="tooltip-label">DC</div><div class="tooltip-value">${p.dcName || '-'}${p.dcName2 ? `<br>${p.dcName2}` : ''}</div>
                                </div>
                                <div class="tooltip-line">備註: <span>${p.note || '-'}</span></div>
                                ${p.imgUrl ? `<div style="margin-top:6px; text-align:center;"><img src="${p.imgUrl}" style="max-width:100%; border-radius:4px;"></div>` : ''}
                            </div>
                        </div>
                    `;
                    const s = p.score || 0;
                    const t = s >= 105 ? 'T0' : s >= 90 ? 'T1' : s >= 75 ? 'T2' : s >= 60 ? 'T3' : s >= 45 ? 'T4' : 'T5';
                    document.getElementById(`tier-${t}`).appendChild(row);
                });
                initSortable();
            } else {
                tierList.style.display = 'none';
                listNormal.style.display = 'block';
                const list = document.getElementById('playerList');
                list.innerHTML = '';
                filtered.forEach((p, index) => {
                    const row = document.createElement('div');
                    row.className = 'list-row list-row-full';
                    row.dataset.id = p.id;
                    const posHtml = (Array.isArray(p.pos) ? p.pos : [p.pos || 'TOP']).map(pos => `<span class="pos-badge" style="background:${POS_COLORS[pos] || '#999'}">${pos}</span>`).join('');
                    
                    // 根據分數計算顯示的評級與顏色
                    const s = p.score || 0;
                    const rankLabel = s >= 105 ? 'S+' : s >= 90 ? 'S' : s >= 75 ? 'A' : s >= 60 ? 'B' : s >= 45 ? 'C' : 'D';
                    const tierColor = s >= 105 ? '#ff4d4f' : s >= 90 ? '#ff7f7f' : s >= 75 ? '#ffbf7f' : s >= 60 ? '#ffff7f' : s >= 45 ? '#bf7fff' : '#80d4ff';

                    row.innerHTML = `
                        <div class="player-card" style="display: flex; align-items: center; padding: 12px; gap: 12px;">
                            <div style="font-size: 1.2rem; font-weight: bold; color: #8892b0; min-width: 30px; text-align: center;">${index + 1}</div>
                            <div style="background: ${tierColor}; color: #000; padding: 4px 8px; border-radius: 4px; font-weight: bold; min-width: 35px; text-align: center;">${rankLabel}</div>
                            <div class="card-content" style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
                                <div class="card-header" style="display: flex; align-items: center; gap: 8px;">
                                    <div class="pos-badge-container" style="display:flex; gap:2px;">${posHtml}</div>
                                    <span class="player-name" style="font-size: 1.1rem; font-weight: bold;">${p.nickName || '-'} <span style="font-size: 0.9rem; color: #8892b0; font-weight: normal;">(${p.name || '-'})</span></span>
                                </div>
                                <div class="card-footer" style="font-size: 0.85rem; color: #8892b0;">DC: ${[p.dcName, p.dcName2].filter(Boolean).join(' / ')} | 備註: ${p.note || '-'}</div>
                            </div>
                            ${p.imgUrl ? `<div class="card-img"><img src="${p.imgUrl}" style="max-height: 40px; border-radius: 4px;"></div>` : ''}
                            <div class="card-actions"><span class="drag-handle" style="cursor: grab; font-size: 1.2rem;">⠿</span><span class="menu-dots" style="cursor: pointer; font-size: 1.2rem; padding: 0 5px;" onclick="openModal('${p.id}')">⋮</span></div>
                        </div>
                    `;
                    list.appendChild(row);
                });
                initSortableList();
            }
        }
        
        // 初始自動登入
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
        } else {
            signInAnonymously(auth);
        }
    </script>
    <style>
        :root { --bg-color: #0a1219; --card-bg: #111e2a; --text-color: #e6edf3; --accent: #61dafb; --input-bg: #182633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); padding: 20px; box-sizing: border-box; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 100px; position: relative; }
        /* 霧面遮罩樣式 */
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 90; display: none; justify-content: center; align-items: center; background: rgba(10,18,25,0.6); backdrop-filter: blur(10px); border-radius: 16px; flex-direction: column; gap: 15px; }
        .lock-icon { font-size: 3rem; }
        .unlock-btn { padding: 12px 24px; background: var(--accent); color: #0a1219; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid #2d455c; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #162431; border: 1px solid #2d455c; color: #8892b0; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #0a1219; }
        .search-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .search-box { flex: 1; padding: 14px; background: var(--input-bg); border: 1px solid #2d455c; border-radius: 8px; color: white; }
        .search-controls { display: flex; align-items: center; gap: 15px; }
        .edit-toggle-wrapper { display: flex; align-items: center; gap: 8px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cccccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #8DC63F; }
        input:checked + .slider:before { transform: translateX(20px); }
        .view-switcher { display: flex; gap: 6px; }
        .view-btn { padding: 12px 16px; background: #162431; border: 1px solid #2d455c; color: #8892b0; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .view-btn.active { background: var(--accent); color: #0a1219; }
        .list-container { width: 100%; position: relative; }
        .tier-list-container { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .tier-row { display: flex; background: #0f1c2c; border: 1px solid #2d455c; border-radius: 12px; min-height: 90px; }
        .tier-header { width: 110px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; color: #000; padding: 10px; border-top-left-radius: 11px; border-bottom-left-radius: 11px; }
        .tier-content { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; min-height: 70px; background: #111e2a; border-top-right-radius: 11px; border-bottom-right-radius: 11px; }
        .tier-t0 { background-color: #ff4d4f; } .tier-t1 { background-color: #ff7f7f; } .tier-t2 { background-color: #ffbf7f; }
        .tier-t3 { background-color: #ffff7f; } .tier-t4 { background-color: #bf7fff; } .tier-t5 { background-color: #80d4ff; }
        .list-row { width: auto; position: relative; }
        .list-row-full { width: 100% !important; margin-bottom: 12px; }
        .player-card { background: var(--card-bg); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; border: 1px solid #2d455c; gap: 4px; position: relative; }
        .card-content { display: flex; align-items: center; min-width: 0; flex: 1; }
        .pos-badge { padding: 2px 6px; border-radius: 20px; color: #fff; font-size: 0.55rem; font-weight: bold; margin-bottom: 2px; }
        .player-name { font-weight: bold; font-size: 0.95rem; }
        .card-actions { display: none; align-items: center; gap: 6px; margin-left: 6px; color: #556677; }
        body.edit-mode .card-actions { display: flex; }
        .card-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #0d1a24; border: 1px solid var(--accent); border-radius: 8px; padding: 12px; width: 220px; z-index: 999; box-shadow: 0 8px 24px rgba(0,0,0,0.85); margin-bottom: 10px; }
        .player-card:hover .card-tooltip { display: block; }
        .tooltip-title { font-weight: bold; font-size: 0.95rem; border-bottom: 1px solid #2d455c; padding-bottom: 4px; margin-bottom: 6px; }
        .tooltip-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 8px; font-size: 0.8rem; }
        .tooltip-label { color: #8892b0; }
        .tooltip-line { font-size: 0.8rem; color: #8892b0; margin-top: 6px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(10,18,25,0.9); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid #2d455c; }
        .form-group { margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #2d455c; border-radius: 6px; background: var(--input-bg); color: white; box-sizing: border-box; }
        .pos-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .pos-option { padding: 8px 0; border: 2px solid #2d455c; background: #162431; color: #8892b0; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .pos-option.active { border-color: var(--accent); color: #fff; }
        .fab { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; padding: 16px; background: var(--accent); color: #0a1219; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 50; }
        .btn-del { background: #ff4d4f !important; color: white !important; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.pinimg.com/736x/d1/b1/1d/d1b11d5e4dbae547ac0d651476cec488.jpg" alt="Logo" class="logo">
            <h1>玩家統計系統</h1>
        </div>
        <div class="tabs">
            <button class="tab-btn" data-tab="players" onclick="switchTab('players')">評級榜</button>
            <button class="tab-btn active" data-tab="trash" onclick="switchTab('trash')">畜生名單</button>
        </div>
        <div class="search-row">
            <input type="text" class="search-box" placeholder="🔍 搜尋 ID 或 DC..." oninput="updateSearch(this.value)">
            <div class="search-controls">
                <div class="edit-toggle-wrapper">
                    <span class="edit-toggle-label">編輯</span>
                    <label class="switch">
                        <input type="checkbox" id="editModeToggle" onchange="toggleEditMode(this.checked)">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="view-switcher">
                    <button class="view-btn active" data-view="tier" onclick="switchView('tier')">分級模式</button>
                    <button class="view-btn" data-view="list" onclick="switchView('list')">排名列表</button>
                </div>
            </div>
        </div>
        <div class="list-container">
            <!-- 霧面遮罩，現在移到這裡，只遮蓋評分區/列表區 -->
            <div id="lockOverlay" class="lock-overlay">
                <div class="lock-icon">🔒</div>
                <p>評級榜已上鎖</p>
                <button class="unlock-btn" onclick="showPasswordModal()">點擊輸入密碼解鎖</button>
            </div>

            <div id="listNormal" style="display: none; width: 100%;">
                <div class="normal-list-view-layout">
                    <div id="numberColumn" class="number-column"></div>
                    <div id="playerList" class="player-list-container"></div>
                </div>
            </div>
            <div id="tierList" class="tier-list-container">
                <div class="tier-row"><div class="tier-header tier-t0">S+</div><div id="tier-T0" class="tier-content" data-tier="T0"></div></div>
                <div class="tier-row"><div class="tier-header tier-t1">S</div><div id="tier-T1" class="tier-content" data-tier="T1"></div></div>
                <div class="tier-row"><div class="tier-header tier-t2">A</div><div id="tier-T2" class="tier-content" data-tier="T2"></div></div>
                <div class="tier-row"><div class="tier-header tier-t3">B</div><div id="tier-T3" class="tier-content" data-tier="T3"></div></div>
                <div class="tier-row"><div class="tier-header tier-t4">C</div><div id="tier-T4" class="tier-content" data-tier="T4"></div></div>
                <div class="tier-row"><div class="tier-header tier-t5">D</div><div id="tier-T5" class="tier-content" data-tier="T5"></div></div>
            </div>
        </div>
    </div>

    <button class="fab" onclick="openModal()">+ 新增玩家</button>
    
    <div class="modal" id="passwordModal" style="z-index: 3000;">
        <div class="modal-content" style="text-align: center;">
            <h2 style="margin-top:0; color:#fff;">請輸入密碼</h2>
            <div class="form-group"><input type="password" id="passwordInput" placeholder="輸入密碼..." style="text-align: center; font-size: 1.1rem; padding: 12px;"></div>
            <div style="display:flex; justify-content:center; gap:10px; margin-top: 20px;">
                <button onclick="closePasswordModal()" style="padding:10px 20px; background:#2d455c; border:none; border-radius:6px; color:#fff; cursor:pointer;">取消</button>
                <button onclick="verifyPassword()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:6px; color:#000; font-weight:bold; cursor:pointer;">確認</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-top:0; color:#fff;">編輯資料</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>遊戲 ID</label><input type="text" id="name"></div>
            <div class="form-group"><label>暱稱(顯示名)</label><input type="text" id="nickName"></div>
            <div class="form-group"><label>DC 名稱</label><input type="text" id="dcName" style="margin-bottom:8px;"><input type="text" id="dcName2"></div>
            <div class="form-group"><label>位置</label>
                <div class="pos-grid">
                    <button class="pos-option" data-pos="TOP" onclick="selectPos('TOP')" style="color:#9747FF">TOP</button>
                    <button class="pos-option" data-pos="MID" onclick="selectPos('MID')" style="color:#ff4d4f">MID</button>
                    <button class="pos-option" data-pos="JG"  onclick="selectPos('JG')"  style="color:#10B981">JG</button>
                    <button class="pos-option" data-pos="AD"  onclick="selectPos('AD')"  style="color:#F59E0B">AD</button>
                    <button class="pos-option" data-pos="SUP" onclick="selectPos('SUP')" style="color:#EC4899">SUP</button>
                </div>
            </div>
            <div class="form-group"><label>實力分級</label><select id="score"><option value="S+">S+</option><option value="S">S</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></div>
            <div class="form-group"><label>備註</label><textarea id="note"></textarea></div>
            <div class="form-group"><label>備註圖片 (網址)</label><input type="text" id="imgUrl"></div>
            <div style="display:flex; justify-content:space-between; gap:10px;">
                <button id="delBtn" class="btn-del" onclick="deletePlayer()">刪除</button>
                <div style="display:flex; gap:10px;"><button onclick="closeModal()" style="padding:10px 20px; background:#2d455c; border:none; border-radius:6px; color:#fff; cursor:pointer;">取消</button><button onclick="savePlayer()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:6px; color:#000; font-weight:bold; cursor:pointer;">儲存</button></div>
            </div>
        </div>
    </div>
</body>
</html>
