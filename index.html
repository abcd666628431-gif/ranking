<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄聯盟-統計系統</title>
    <link rel="icon" href="https://i.pinimg.com/736x/d1/b1/1d/d1b11d5e4dbae547ac0d651476cec488.jpg" type="image/jpeg">
    <link rel="shortcut icon" href="https://i.pinimg.com/736x/d1/b1/1d/d1b11d5e4dbae547ac0d651476cec488.jpg" type="image/jpeg">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-app.js";
        // 新增引入 setDoc (用於處理用戶權限與訪客記錄)
        import { getFirestore, collection, doc, updateDoc, onSnapshot, addDoc, deleteDoc, query, orderBy, limit, setDoc } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://gs.jurieo.com/gemini/gstatic/firebasejs/11.6.1/firebase-auth.js";

        const userConfig = {
            apiKey: "AIzaSyDcH7BFp9xghWLdgvsLseo3XyJG_opf9A8",
            authDomain: "icarus2-50e01.firebaseapp.com",
            projectId: "icarus2-50e01",
            storageBucket: "icarus2-50e01.firebasestorage.app",
            messagingSenderId: "67456823",
            appId: "1:67456823:web:9b90f0c93d3cd1c7a394b2"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : (userConfig.appId || 'default-app-id');

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const POS_COLORS = { MID: '#ff4d4f', TOP: '#9747FF', AD: '#F59E0B', JG: '#10B981', SUP: '#EC4899' };
        
        // 優化：加入本地記憶，載入上次瀏覽的設定
        let activeTab = localStorage.getItem('lol_activeTab') || 'players'; 
        let searchQuery = localStorage.getItem('lol_searchQuery') || '';
        let activeView = localStorage.getItem('lol_activeView') || 'tier'; 
        
        let dataStore = { players: [], trash: [] };
        let logsStore = []; // 存放日誌資料
        let selectedPos = []; 
        let sortableInstances = [];
        let sortableListInstance = null;
        let isEditMode = false;
        
        let isPlayersTabUnlocked = localStorage.getItem('isUnlocked') === 'true'; 

        // 宣告全域變數
        let currentUserRole = 'guest'; 
        let authUsersStore = {};
        let visitorsStore = {};

        const getCol = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);

        let isFirstVisit = !localStorage.getItem('sysUserName'); // 判斷是否為初次進入
        let sysUserName = localStorage.getItem('sysUserName') || '用戶_' + Math.floor(Math.random() * 900 + 100);
        let sysUserColor = localStorage.getItem('sysUserColor') || '#ffbae9';

        // 版面動態設定初始化
        const defaultLayoutUI = { gapMain: 12, radius: 8, cardPx: 8, cardPy: 6, logWidth: 320, borderW: 1, logHeight: 80, nameGap: 4 };
        let currentLayoutUI = JSON.parse(localStorage.getItem('sysLayoutUI')) || {...defaultLayoutUI};
        function applyLayoutUI(layout) {
            const root = document.documentElement;
            root.style.setProperty('--sys-gap-main', layout.gapMain + 'px');
            root.style.setProperty('--sys-radius', layout.radius + 'px');
            root.style.setProperty('--sys-card-px', layout.cardPx + 'px');
            root.style.setProperty('--sys-card-py', layout.cardPy + 'px');
            root.style.setProperty('--sys-log-w', layout.logWidth + 'px');
            root.style.setProperty('--sys-border-w', layout.borderW + 'px');
            root.style.setProperty('--sys-log-h', layout.logHeight + 'vh');
            root.style.setProperty('--sys-name-gap', layout.nameGap + 'px');
        }
        applyLayoutUI(currentLayoutUI);

        window.openUISettings = () => {
            document.getElementById('setGapMain').value = currentLayoutUI.gapMain;
            document.getElementById('setRadius').value = currentLayoutUI.radius;
            document.getElementById('setCardPx').value = currentLayoutUI.cardPx;
            document.getElementById('setCardPy').value = currentLayoutUI.cardPy;
            document.getElementById('setLogWidth').value = currentLayoutUI.logWidth;
            document.getElementById('setBorderW').value = currentLayoutUI.borderW;
            document.getElementById('setLogHeight').value = currentLayoutUI.logHeight;
            document.getElementById('setNameGap').value = currentLayoutUI.nameGap;
            updateUIPreviewLabels();
            document.getElementById('uiSettingsModal').style.display = 'flex';
        };

        window.closeUISettings = () => {
            applyLayoutUI(currentLayoutUI); // 取消時復原畫面
            document.getElementById('uiSettingsModal').style.display = 'none';
        };

        window.saveUISettings = async () => {
            currentLayoutUI = {
                gapMain: parseInt(document.getElementById('setGapMain').value),
                radius: parseInt(document.getElementById('setRadius').value),
                cardPx: parseInt(document.getElementById('setCardPx').value),
                cardPy: parseInt(document.getElementById('setCardPy').value),
                logWidth: parseInt(document.getElementById('setLogWidth').value),
                borderW: parseInt(document.getElementById('setBorderW').value),
                logHeight: parseInt(document.getElementById('setLogHeight').value),
                nameGap: parseInt(document.getElementById('setNameGap').value)
            };
            localStorage.setItem('sysLayoutUI', JSON.stringify(currentLayoutUI)); // 保留作為防閃爍快取
            applyLayoutUI(currentLayoutUI);
            document.getElementById('uiSettingsModal').style.display = 'none';

            // 寫入 Firebase 進行全域強制同步
            if (currentUserRole === 'admin') {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'layout'), currentLayoutUI);
                    writeLog('系統', '版面微調', '全域同步了新的介面外觀');
                } catch(e) { console.error('Sync layout error:', e); }
            }
        };

        window.resetUISettings = async () => {
            currentLayoutUI = {...defaultLayoutUI};
            localStorage.setItem('sysLayoutUI', JSON.stringify(currentLayoutUI));
            applyLayoutUI(currentLayoutUI);
            openUISettings(); 

            // 寫入 Firebase 進行全域還原
            if (currentUserRole === 'admin') {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'layout'), currentLayoutUI);
                    writeLog('系統', '版面微調', '已將全域介面還原為預設值');
                } catch(e) { console.error('Reset layout error:', e); }
            }
        };

        window.previewUISettings = () => {
            const tempLayout = {
                gapMain: parseInt(document.getElementById('setGapMain').value),
                radius: parseInt(document.getElementById('setRadius').value),
                cardPx: parseInt(document.getElementById('setCardPx').value),
                cardPy: parseInt(document.getElementById('setCardPy').value),
                logWidth: parseInt(document.getElementById('setLogWidth').value),
                borderW: parseInt(document.getElementById('setBorderW').value),
                logHeight: parseInt(document.getElementById('setLogHeight').value),
                nameGap: parseInt(document.getElementById('setNameGap').value)
            };
            applyLayoutUI(tempLayout);
            updateUIPreviewLabels();
        };

        function updateUIPreviewLabels() {
            document.getElementById('valGapMain').innerText = document.getElementById('setGapMain').value + 'px';
            document.getElementById('valRadius').innerText = document.getElementById('setRadius').value + 'px';
            document.getElementById('valCardPx').innerText = document.getElementById('setCardPx').value + 'px';
            document.getElementById('valCardPy').innerText = document.getElementById('setCardPy').value + 'px';
            document.getElementById('valLogWidth').innerText = document.getElementById('setLogWidth').value + 'px';
            document.getElementById('valBorderW').innerText = document.getElementById('setBorderW').value + 'px';
            document.getElementById('valLogHeight').innerText = document.getElementById('setLogHeight').value + 'vh';
            document.getElementById('valNameGap').innerText = document.getElementById('setNameGap').value + 'px';
        }

        window.openUserNameModal = () => {
            document.getElementById('newUserNameInput').value = sysUserName;
            document.getElementById('newUserColorInput').value = sysUserColor;
            document.getElementById('userNameModal').style.display = 'flex';
        };

        window.closeUserNameModal = () => {
            // 如果是初次進入，必須填寫名字才能關閉
            if (isFirstVisit && !document.getElementById('newUserNameInput').value.trim()) {
                const input = document.getElementById('newUserNameInput');
                input.placeholder = "請輸入一個名稱開始使用！";
                input.style.border = "1px solid #ff4d4f";
                setTimeout(() => input.style.border = "1px solid #2d455c", 2000);
                return;
            }
            document.getElementById('userNameModal').style.display = 'none';
        };

        window.saveUserName = async () => {
            let newName = document.getElementById('newUserNameInput').value.trim();
            const newColor = document.getElementById('newUserColorInput').value;
            
            if (newName) {
                // 防冒用保護機制
                const reservedWords = ['管理員', '系統', 'admin', 'system', 'godcloud'];
                const isReserved = reservedWords.some(w => newName.toLowerCase().includes(w));
                
                // 如果目前不是管理員，卻想改名叫管理員，就擋下來
                if (isReserved && currentUserRole !== 'admin' && newName !== '神雲') {
                    const input = document.getElementById('newUserNameInput');
                    input.value = '';
                    input.placeholder = "此為保留字無法使用！";
                    input.style.border = "1px solid #ff4d4f";
                    setTimeout(() => {
                        input.placeholder = "輸入您的名稱...";
                        input.style.border = "1px solid #2d455c";
                    }, 2000);
                    return;
                }

                sysUserName = newName;
                sysUserColor = newColor;
                localStorage.setItem('sysUserName', sysUserName);
                localStorage.setItem('sysUserColor', sysUserColor);
                
                isFirstVisit = false;
                
                // 記錄訪客足跡到資料庫
                try {
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'visitors', sysUserName);
                    await setDoc(userRef, {
                        name: sysUserName,
                        lastSeen: Date.now()
                    }, { merge: true });
                } catch(e) { console.error('Visitor tracking error:', e); }

                checkPermissions(); // 重新驗證權限
                updateUserDisplay();
                renderLogs();
                closeUserNameModal();
            }
        };

        // 更新右上角顯示的名稱與身分標籤
        function updateUserDisplay() {
            const displayEl = document.getElementById('displayUserName');
            const roleBadge = document.getElementById('userRoleBadge');
            const adminBtn = document.getElementById('adminPanelBtn');
            
            if(displayEl) {
                displayEl.innerText = sysUserName;
                displayEl.style.color = sysUserColor;
            }
            
            if(roleBadge) {
                if(currentUserRole === 'admin') {
                    roleBadge.innerText = '管理員';
                    roleBadge.className = 'role-badge admin';
                } else if (currentUserRole === 'member') {
                    roleBadge.innerText = '會員';
                    roleBadge.className = 'role-badge member';
                } else {
                    roleBadge.innerText = '訪客';
                    roleBadge.className = 'role-badge guest';
                }
            }
            
            // 只有管理員能看到管理按鈕
            if(adminBtn) {
                adminBtn.style.display = currentUserRole === 'admin' ? 'flex' : 'none';
            }
        }

        // 權限驗證邏輯
        function checkPermissions() {
            // 預設神雲為管理員
            if (sysUserName === '神雲') {
                currentUserRole = 'admin';
                isPlayersTabUnlocked = true;
                localStorage.setItem('isUnlocked', 'true');
            } 
            // 如果在授權名單中
            else if (authUsersStore[sysUserName]) {
                currentUserRole = authUsersStore[sysUserName].role; // 'admin' 或 'member'
                isPlayersTabUnlocked = true;
                localStorage.setItem('isUnlocked', 'true');
            } 
            // 否則為訪客
            else {
                currentUserRole = 'guest';
                isPlayersTabUnlocked = false; // 訪客鎖定評級榜
                localStorage.setItem('isUnlocked', 'false');
                isEditMode = false; // 強制關閉編輯模式
                const toggle = document.getElementById('editModeToggle');
                if(toggle) toggle.checked = false;
                toggleEditMode(false);
            }
            
            updateUserDisplay();
            render();
        }

        // --- 用戶管理面板邏輯 ---
        window.openAdminPanel = () => {
            if (currentUserRole !== 'admin') return;
            renderAdminPanel();
            document.getElementById('adminModal').style.display = 'flex';
        };
        
        window.closeAdminPanel = () => {
            document.getElementById('adminModal').style.display = 'none';
        };

        // 授權或更新用戶權限
        window.grantUserRole = async (userName, role = null) => {
            if (currentUserRole !== 'admin') return;
            
            const nameToGrant = userName || document.getElementById('grantUserId').value.trim();
            const roleToGrant = role || document.getElementById('grantUserRole').value;
            
            if (!nameToGrant) return;
            
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'auth_users', nameToGrant);
                await setDoc(userRef, {
                    name: nameToGrant,
                    role: roleToGrant,
                    updatedAt: Date.now()
                });
                
                // 若本身就在授權自己，立即更新權限
                if (nameToGrant === sysUserName) {
                    checkPermissions();
                }
                
                // 清空輸入框
                const inputId = document.getElementById('grantUserId');
                if(inputId) inputId.value = '';
                
                // 如果是透過提升訪客進來的，可能需要重新渲染面板
                renderAdminPanel();
                
            } catch(e) { console.error('Grant user error:', e); }
        };

        // 移除授權
        window.revokeUser = async (userName) => {
            if (currentUserRole !== 'admin') return;
            if (userName === '神雲') return; // 保護神雲不被拔權限
            
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'auth_users', userName));
                if (userName === sysUserName) checkPermissions(); // 若拔自己權限，立刻生效
            } catch(e) { console.error('Revoke user error:', e); }
        };

        function renderAdminPanel() {
            const listEl = document.getElementById('authUserList');
            const visitorListEl = document.getElementById('visitorRecordList');
            if (!listEl || !visitorListEl) return;
            
            // 渲染授權名單
            listEl.innerHTML = '';
            Object.values(authUsersStore).forEach(u => {
                const div = document.createElement('div');
                div.className = 'admin-list-item';
                div.innerHTML = `
                    <div>
                        <strong>${u.name}</strong> 
                        <span class="role-badge ${u.role === 'admin' ? 'admin' : 'member'}">${u.role === 'admin' ? '管理員' : '會員'}</span>
                    </div>
                    ${u.name !== '神雲' ? `<button onclick="revokeUser('${u.name}')" style="background:#ff4d4f; color:#fff; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">移除</button>` : '<span>不可移除</span>'}
                `;
                listEl.appendChild(div);
            });

            // 渲染訪客名單
            visitorListEl.innerHTML = '';
            
            // 排序訪客，將最新的排前面
            const sortedVisitors = Object.values(visitorsStore)
                .filter(v => v.name !== '神雲' && !authUsersStore[v.name]) // 排除神雲跟已授權的人
                .sort((a, b) => (b.lastSeen || 0) - (a.lastSeen || 0));

            if (sortedVisitors.length === 0) {
                visitorListEl.innerHTML = '<div style="color:#8892b0; text-align:center; padding: 10px;">目前沒有其他訪客紀錄。</div>';
            } else {
                sortedVisitors.forEach(v => {
                    const dateStr = new Date(v.lastSeen || 0).toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' });
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div>
                                <strong style="color:#e6edf3;">${v.name}</strong> 
                                <div style="font-size:10px; color:#8892b0;">最後出沒: ${dateStr}</div>
                            </div>
                            <button onclick="grantUserRole('${v.name}', 'member')" style="background:#61dafb; color:#000; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold;">提升為會員</button>
                        </div>
                    `;
                    visitorListEl.appendChild(div);
                });
            }
        }

        window.openImageModal = (url) => {
            document.getElementById('enlargedImage').src = url;
            document.getElementById('imageModal').style.display = 'flex';
        };

        window.closeImageModal = () => {
            document.getElementById('imageModal').style.display = 'none';
        };

        // 寫入操作日誌函式
        window.writeLog = async (action, targetName, detail) => {
            // 權限攔截：訪客不允許寫入修改日誌 (系統自動產生的例外)
            if (currentUserRole === 'guest' && action !== '系統') return; 
            
            try {
                await addDoc(getCol('logs'), {
                    timestamp: Date.now(),
                    user: sysUserName,
                    action: action,
                    targetName: targetName || '未知',
                    detail: detail || ''
                });
            } catch(e) { console.error('Log write error:', e); }
        };

        window.updateImagePreview = (url) => {
            const previewCont = document.getElementById('imgPreviewContainer');
            const img = document.getElementById('imgPreview');
            const inputCont = document.getElementById('imgInputContainer');
            
            if (url && url.trim() !== '') {
                img.src = url;
                previewCont.style.display = 'block';
                if (url.startsWith('data:image')) {
                    inputCont.style.display = 'none';
                } else {
                    inputCont.style.display = 'block';
                }
            } else {
                img.src = '';
                previewCont.style.display = 'none';
                inputCont.style.display = 'block';
                document.getElementById('imgUrl').value = '';
            }
        };

        window.clearImage = () => {
            window.updateImagePreview('');
        };

        window.handlePaste = (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    const file = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64Url = event.target.result;
                        document.getElementById('imgUrl').value = base64Url;
                        window.updateImagePreview(base64Url);
                    };
                    reader.readAsDataURL(file);
                    e.preventDefault(); 
                    break;
                }
            }
        };

        function getRankLabelByScore(score, tab) {
            const labels = tab === 'trash' ? ['畜生級', '災難級', '危險級', '警戒級', '異常級', '注意級'] : ['S+', 'S', 'A', 'B', 'C', 'D'];
            if (score >= 105) return labels[0];
            if (score >= 90) return labels[1];
            if (score >= 75) return labels[2];
            if (score >= 60) return labels[3];
            if (score >= 45) return labels[4];
            return labels[5];
        }

        function initSortable() {
            sortableInstances.forEach(inst => inst.destroy());
            sortableInstances = [];
            
            // 權限攔截：訪客強制禁用拖曳
            if (currentUserRole === 'guest') return; 

            const currentTab = activeTab;
            const tiers = ['T0', 'T1', 'T2', 'T3', 'T4', 'T5'];
            tiers.forEach(tierId => {
                const el = document.getElementById(`tier-${tierId}`);
                if (!el) return;
                const inst = new Sortable(el, {
                    group: 'sharedTiers', 
                    handle: '.drag-handle',
                    animation: 150,
                    disabled: !isEditMode,
                    forceFallback: true, 
                    fallbackClass: "sortable-fallback",
                    ghostClass: "sortable-ghost",
                    onEnd: async (evt) => {
                        const id = evt.item.dataset.id;
                        const toTier = evt.to.dataset.tier;
                        const newOrder = evt.newIndex;
                        
                        const p = dataStore[currentTab].find(x => x.id === id);
                        let oldScore = p ? (p.score || 0) : parseInt(evt.item.dataset.score) || 0;
                        let newScore = oldScore;

                        if (toTier === 'T0' && newScore < 105) newScore = 110;
                        else if (toTier === 'T1' && (newScore < 90 || newScore >= 105)) newScore = 95;
                        else if (toTier === 'T2' && (newScore < 75 || newScore >= 90)) newScore = 80;
                        else if (toTier === 'T3' && (newScore < 60 || newScore >= 75)) newScore = 65;
                        else if (toTier === 'T4' && (newScore < 45 || newScore >= 60)) newScore = 50;
                        else if (toTier === 'T5' && newScore >= 45) newScore = 35;

                        if (oldScore !== newScore && p) {
                            const oldRank = getRankLabelByScore(oldScore, currentTab);
                            const newRank = getRankLabelByScore(newScore, currentTab);
                            if(oldRank !== newRank) {
                                writeLog('調整', p.name, `由 ${oldRank}級 移至 ${newRank}級`);
                            }
                        }

                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', currentTab, id);
                        await updateDoc(docRef, { order: newOrder, score: newScore });
                    }
                });
                sortableInstances.push(inst);
            });
        }

        function initSortableList() {
            const listEl = document.getElementById('playerList');
            if (sortableListInstance) sortableListInstance.destroy();
            
            // 權限攔截：訪客強制禁用拖曳
            if (currentUserRole === 'guest') return;

            const currentTab = activeTab;
            sortableListInstance = new Sortable(listEl, {
                handle: '.drag-handle',
                animation: 150,
                disabled: !isEditMode,
                forceFallback: true,
                fallbackClass: "sortable-fallback",
                ghostClass: "sortable-ghost",
                onEnd: async (evt) => {
                    const id = evt.item.dataset.id;
                    const newOrder = evt.newIndex;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', currentTab, id);
                    await updateDoc(docRef, { order: newOrder });
                }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            // 載入玩家與雷人名單
            ['players', 'trash'].forEach(col => {
                onSnapshot(getCol(col), (snapshot) => {
                    let newData = [];
                    snapshot.forEach(d => newData.push({ id: d.id, ...d.data() }));
                    newData.sort((a, b) => (a.order || 0) - (b.order || 0));
                    
                    // 🚀 性能優化：深度比對，資料若沒變更則「絕對不觸發」重繪 (解決 F5 刷新閃爍)
                    if (JSON.stringify(dataStore[col]) !== JSON.stringify(newData)) {
                        dataStore[col] = newData;
                        localStorage.setItem('lol_cache_dataStore', JSON.stringify(dataStore));
                        if (activeTab === col) render();
                    }
                }, (err) => console.error("Firestore Error:", err));
            });

            // 載入操作日誌 (最多顯示最新 50 筆)
            onSnapshot(query(getCol('logs'), orderBy('timestamp', 'desc'), limit(50)), (snapshot) => {
                let newLogs = [];
                snapshot.forEach(d => newLogs.push({ id: d.id, ...d.data() }));
                
                // 🚀 性能優化：日誌若沒變更則不觸發重繪
                if (JSON.stringify(logsStore) !== JSON.stringify(newLogs)) {
                    logsStore = newLogs;
                    localStorage.setItem('lol_cache_logsStore', JSON.stringify(logsStore));
                    renderLogs();
                }

                const month = String(logDate.getMonth() + 1).padStart(2, '0');
                const date = String(logDate.getDate()).padStart(2, '0');
                const fullTimeStr = `${month}-${date} ${timeStr}`;

                const el = document.createElement('div');
                el.className = 'log-entry';
                
                el.addEventListener('mouseenter', () => { el.classList.add('expanded'); });
                el.addEventListener('mouseleave', () => { el.classList.remove('expanded'); });

                const isSystem = log.action === '系統' || log.targetName === '系統';
                const isDelete = log.action === '刪除' || log.action === '移除';
                const actionClass = isDelete ? 'log-action danger' : 'log-action';
                const targetClass = isSystem ? 'log-target system' : 'log-target';
                
                const userColor = log.user === sysUserName ? sysUserColor : '#47daff';

                let innerHtml = `
                    <span class="log-time" title="${fullTimeStr}" style="cursor: help;">${timeStr}</span>
                    <span class="log-user" style="color: ${userColor}">${log.user}</span>
                `;

                if (isSystem) {
                    const displayAction = log.action === '系統' ? '' : log.action;
                    innerHtml += `
                        <span class="${targetClass}" title="${log.targetName}">${displayAction} <span style="color: #ffbae9;">[</span>${log.targetName}<span style="color: #ffbae9;">]</span></span>
                    `;
                    if (log.detail) innerHtml += `<span class="${targetClass}" style="margin-left:4px;">${log.detail}</span>`;
                } else {
                    innerHtml += `
                        <span class="${actionClass}">${log.action}</span>
                        <span class="${targetClass}" title="${log.targetName}"><span style="color: #ffbae9;">[</span>${log.targetName}<span style="color: #ffbae9;">]</span></span>

                        innerHtml += `<span class="log-detail font-black text-[#47daff] text-[10.5px] pr-2 ml-1 shrink-0">${log.detail}</span>`;

            .player-card:hover .card-tooltip { display: none; }
            
            .pos-option { padding: 5px 0; font-size: 0.8rem; }
            .modal-content { padding: 15px; width: 92%; }
            input, textarea, select { padding: 8px; font-size: 0.9rem; }
            .form-group { margin-bottom: 12px; }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <img src="https://i.pinimg.com/736x/d1/b1/1d/d1b11d5e4dbae547ac0d651476cec488.jpg" alt="Logo" class="logo">
                <div style="display: flex; align-items: baseline; gap: 8px;">
                    <h1>玩家統計系統</h1>
                    <span style="font-size: 0.9rem; color: #8892b0; font-weight: bold;">v1.0</span>
                </div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="players" onclick="switchTab('players')">評級榜</button>
                <button class="tab-btn" data-tab="trash" onclick="switchTab('trash')">雷人榜</button>
            </div>
            <div class="search-row">
                <input type="text" class="search-box" placeholder="🔍 搜尋 ID 或 DC..." oninput="updateSearch(this.value)">
                <div class="search-controls">
                    <div class="edit-toggle-wrapper">
                        <span class="edit-toggle-label">編輯</span>
                        <label class="switch">
                            <input type="checkbox" id="editModeToggle" onchange="toggleEditMode(this.checked)">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="view-switcher">
                        <button class="view-btn active" data-view="tier" onclick="switchView('tier')">分級模式</button>
                        <button class="view-btn" data-view="list" onclick="switchView('list')">排名列表</button>
                    </div>
                </div>
            </div>

            <div class="list-container">
                <div id="lockOverlay" class="lock-overlay">
                    <div class="lock-icon">🔒</div>
                    <p style="font-weight:bold; margin:0; color:#fff;">評級榜權限受限制</p>
                    <p style="font-size:0.85rem; color:#8892b0; margin:0; margin-top:-5px;">訪客模式僅能觀看雷人榜，請聯絡管理員開通權限。</p>
                </div>

                <div id="listNormal" style="display: none; width: 100%;">
                    <div class="normal-list-view-layout">
                        <div id="numberColumn" class="number-column"></div>
                        <div id="playerList" class="player-list-container"></div>
                    </div>
                </div>

                <div id="tierList" class="tier-list-container">
                    <div class="tier-row">
                        <div class="tier-header tier-t0">S+</div>
                        <div id="tier-T0" class="tier-content" data-tier="T0"></div>
                    </div>
                    <div class="tier-row">
                        <div class="tier-header tier-t1">S</div>
                        <div id="tier-T1" class="tier-content" data-tier="T1"></div>
                    </div>
                    <div class="tier-row">
                        <div class="tier-header tier-t2">A</div>
                        <div id="tier-T2" class="tier-content" data-tier="T2"></div>
                    </div>
                    <div class="tier-row">
                        <div class="tier-header tier-t3">B</div>
                        <div id="tier-T3" class="tier-content" data-tier="T3"></div>
                    </div>
                    <div class="tier-row">
                        <div class="tier-header tier-t4">C</div>
                        <div id="tier-T4" class="tier-content" data-tier="T4"></div>
                    </div>
                    <div class="tier-row">
                        <div class="tier-header tier-t5">D</div>
                        <div id="tier-T5" class="tier-content" data-tier="T5"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 操作日誌側邊欄 -->
        <div class="log-sidebar">
            <div class="log-header" style="display: flex; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffbae9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    操作日誌
                </div>
                <div style="display: flex; align-items: center; gap: 6px;">
                    <div id="adminPanelBtn" class="sys-btn-icon" onclick="openAdminPanel()" title="用戶與權限管理" style="display: none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    </div>
                    <div id="uiSettingsBtn" class="sys-btn-icon" onclick="openUISettings()" title="版面與外觀微調" style="display: none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                    </div>
                    <div style="font-size: 10px; color: rgba(255,255,255,0.4); cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; background: rgba(0,0,0,0.2);" onclick="openUserNameModal()" onmouseover="this.style.color='#ffbae9'; this.style.borderColor='rgba(255,186,233,0.3)'" onmouseout="this.style.color='rgba(255,255,255,0.4)'; this.style.borderColor='rgba(255,255,255,0.1)'" title="修改操作者名稱">
                        <span id="userRoleBadge" class="role-badge guest">訪客</span>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        <span id="displayUserName">未知</span>
                    </div>
                </div>
            </div>
            <div class="log-content" id="logContent">
                <!-- 日誌項目將在此動態載入 -->
            </div>
        </div>
    </div>
    
    <button class="fab" onclick="openModal()">+ 新增玩家</button>
    
    <!-- 系統已無密碼解鎖視窗，移除 passwordModal 區塊 -->

    <div class="modal" id="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0; color:#fff;">編輯資料</h2>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="margin: 0; color: #8892b0; font-size: 0.85rem; white-space: nowrap;">建立日期</label>
                    <input type="date" id="createDate" style="padding: 6px 10px; font-size: 0.85rem; width: 135px;">
                </div>
            </div>
            <input type="hidden" id="editId">
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>遊戲 ID</label>
                    <input type="text" id="name">
                </div>
                <div style="flex: 1;">
                    <label>暱稱(顯示名)</label>
                    <input type="text" id="nickName" placeholder="自訂名稱">
                </div>
            </div>
            <div class="form-group">
                <label>DC 名稱</label>
                <input type="text" id="dcName" style="margin-bottom: 8px;" placeholder="DC帳號(顯示名稱)">
                <input type="text" id="dcName2" placeholder="DC帳號(使用者名稱)">
            </div>
            <div class="form-group"><label>位置 (可多選)</label>
                <div class="pos-grid">
                    <button class="pos-option" data-pos="MID" onclick="selectPos('MID')" style="color:#ff4d4f">MID</button>
                    <button class="pos-option" data-pos="TOP" onclick="selectPos('TOP')" style="color:#9747FF">TOP</button>
                    <button class="pos-option" data-pos="AD"  onclick="selectPos('AD')"  style="color:#F59E0B">AD</button>
                    <button class="pos-option" data-pos="JG"  onclick="selectPos('JG')"  style="color:#10B981">JG</button>
                    <button class="pos-option" data-pos="SUP" onclick="selectPos('SUP')" style="color:#EC4899">SUP</button>
                </div>
            </div>
            <div class="form-group">
                <label id="scoreLabel">實力分級</label>
                <select id="score">
                    <option value="S+">S+</option>
                    <option value="S">S</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>
            <div class="form-group"><label>備註</label><textarea id="note"></textarea></div>
            
            <div class="form-group">
                <label>備註圖片</label>
                <div id="imgInputContainer">
                    <input type="text" id="imgUrl" onpaste="handlePaste(event)" oninput="updateImagePreview(this.value)" placeholder="在此 Ctrl+V 貼上截圖，或輸入網址...">
                </div>
                <div id="imgPreviewContainer" class="img-preview-box" style="display: none;">
                    <button type="button" class="img-preview-remove" onclick="clearImage()">×</button>
                    <img id="imgPreview" src="" alt="圖片預覽">
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; gap:10px;">
                <button id="delBtn" class="btn-del" onclick="deletePlayer()">刪除</button>
                <div style="display:flex; gap:10px;">
                    <button onclick="closeModal()" style="padding:10px 20px; background:#2d455c; border:none; border-radius:6px; color:#fff; cursor:pointer;">取消</button>
                    <button onclick="savePlayer()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:6px; color:#000; font-weight:bold; cursor:pointer;">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 使用者名稱設定 Modal -->
    <div class="modal" id="userNameModal" style="z-index: 3000;">
        <div class="modal-content" style="text-align: center; width: 90%; max-width: 320px;">
            <h2 style="margin-top:0; color:#fff;">個人設定</h2>
            <div class="form-group">
                <input type="text" id="newUserNameInput" placeholder="輸入您的名稱 (不能包含系統保留字)..." style="text-align: center; font-size: 1.1rem; padding: 12px; font-weight: bold;">
            </div>
            <div class="form-group" style="display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--input-bg); border: 1px solid #2d455c; padding: 10px; border-radius: 6px;">
                <label style="margin: 0; color: #8892b0; font-size: 0.95rem; font-weight: bold;">日誌專屬顏色</label>
                <input type="color" id="newUserColorInput" style="width: 40px; height: 30px; padding: 0; border: none; border-radius: 4px; cursor: pointer; background: transparent;">
            </div>
            <div style="display:flex; justify-content:center; gap:10px; margin-top: 20px;">
                <button onclick="saveUserName()" style="padding:10px 40px; background:var(--accent); border:none; border-radius:6px; color:#000; font-weight:bold; cursor:pointer;">儲存設定</button>
            </div>
        </div>
    </div>

    <!-- 用戶管理面板 Modal -->
    <div class="modal" id="adminModal" style="z-index: 3000;">
        <div class="modal-content" style="width: 90%; max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0; color:#fff;">⚙️ 用戶與權限管理</h2>
                <button onclick="closeAdminPanel()" style="background: none; border: none; color: #8892b0; font-size: 1.2rem; cursor: pointer;">×</button>
            </div>
            
            <div class="admin-panel">
                <!-- 授權名單區塊 -->
                <div class="admin-section">
                    <h3 style="margin: 0 0 10px 0; color: var(--accent); font-size: 1rem;">✅ 已授權名單</h3>
                    <div id="authUserList" style="max-height: 150px; overflow-y: auto; padding-right: 5px;">
                        <!-- 授權用戶將動態載入 -->
                    </div>
                </div>

                <!-- 手動加入權限區塊 -->
                <div class="admin-section">
                    <h3 style="margin: 0 0 10px 0; color: var(--accent); font-size: 1rem;">➕ 手動指派權限</h3>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="grantUserId" placeholder="輸入使用者 ID..." style="flex: 2;">
                        <select id="grantUserRole" style="flex: 1;">
                            <option value="member">會員 (編輯)</option>
                            <option value="admin">管理員</option>
                        </select>
                        <button onclick="grantUserRole()" style="background: var(--accent); color: #000; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; cursor: pointer;">加入</button>
                    </div>
                </div>

                <!-- 訪客紀錄區塊 -->
                <div class="admin-section">
                    <h3 style="margin: 0 0 10px 0; color: #ffbf7f; font-size: 1rem;">👀 訪客出沒紀錄 (一鍵升級)</h3>
                    <div style="font-size: 0.8rem; color: #8892b0; margin-bottom: 8px;">以下是曾經在本系統設定過名稱的訪客名單，可直接將其升級為會員。</div>
                    <div id="visitorRecordList" style="max-height: 200px; overflow-y: auto; padding-right: 5px;">
                        <!-- 訪客紀錄將動態載入 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 圖片放大預覽 Modal -->
    <div class="modal" id="imageModal" onclick="closeImageModal()" style="z-index: 4000; cursor: zoom-out;">
        <div style="max-width: 90%; max-height: 90%; display: flex; justify-content: center; align-items: center;">
            <img id="enlargedImage" src="" style="max-width: 100%; max-height: 90vh; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); object-fit: contain;">
        </div>
    </div>

    <!-- 版面與外觀設定 Modal -->
    <div class="modal" id="uiSettingsModal" style="z-index: 3500;">
        <div class="modal-content" style="width: 90%; max-width: 450px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; color:#fff;">🎨 版面與外觀微調</h2>
                <button onclick="closeUISettings()" style="background: none; border: none; color: #8892b0; font-size: 1.5rem; cursor: pointer; padding: 0; line-height: 1;">×</button>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 18px; margin-bottom: 25px;">
                <div class="ui-slider-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <label>主區塊間距 (Gap)</label><span id="valGapMain" class="val-badge">12px</span>
                    </div>
                    <input type="range" id="setGapMain" min="0" max="40" value="12" oninput="previewUISettings()">
                </div>
                
                <div class="ui-slider-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <label>日誌側邊欄寬度</label><span id="valLogWidth" class="val-badge">320px</span>
                    </div>
                    <input type="range" id="setLogWidth" min="200" max="600" value="320" oninput="previewUISettings()">
                </div>

                <div class="ui-slider-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <label>日誌側邊欄高度 (vh)</label><span id="valLogHeight" class="val-badge">80vh</span>
                    </div>
                    <input type="range" id="setLogHeight" min="30" max="100" value="80" oninput="previewUISettings()">
                </div>
                
                <div class="ui-slider-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <label>位置標籤與名稱間距</label><span id="valNameGap" class="val-badge">4px</span>
                    </div>
                    <input type="range" id="setNameGap" min="0" max="40" value="4" oninput="previewUISettings()">
                </div>

                <div class="ui-slider-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <label>全域元件圓角 (Border Radius)</label><span id="valRadius" class="val-badge">8px</span>
                    </div>
                    <input type="range" id="setRadius" min="0" max="24" value="8" oninput="previewUISettings()">
                </div>

                <div class="ui-slider-group">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <label>全域邊框粗細 (Border Width)</label><span id="valBorderW" class="val-badge">1px</span>
                    </div>
                    <input type="range" id="setBorderW" min="0" max="5" value="1" oninput="previewUISettings()">
                </div>

                <div style="display:flex; gap:15px;">
                    <div class="ui-slider-group" style="flex:1;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <label>卡片左右內距</label><span id="valCardPx" class="val-badge">8px</span>
                        </div>
                        <input type="range" id="setCardPx" min="0" max="24" value="8" oninput="previewUISettings()">
                    </div>
                    <div class="ui-slider-group" style="flex:1;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <label>卡片上下內距</label><span id="valCardPy" class="val-badge">6px</span>
                        </div>
                        <input type="range" id="setCardPy" min="0" max="24" value="6" oninput="previewUISettings()">
                    </div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; gap:10px;">
                <button onclick="resetUISettings()" style="padding:10px 15px; background:#ff4d4f; border:none; border-radius:6px; color:#fff; cursor:pointer; font-weight:bold;">還原預設</button>
                <div style="display:flex; gap:10px;">
                    <button onclick="closeUISettings()" style="padding:10px 20px; background:#2d455c; border:none; border-radius:6px; color:#fff; cursor:pointer;">取消</button>
                    <button onclick="saveUISettings()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:6px; color:#000; font-weight:bold; cursor:pointer;">儲存設定</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
